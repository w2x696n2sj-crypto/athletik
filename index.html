<title>Apex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--surface:#161616;--surface2:#242424;--surface3:#2a2a2a;
  --line:#262626;--line2:#3a3a38;
  --ink:#f4f4f3;--ink2:#a1a1aa;--ink3:#6c6c70;
  --pop:#c3f400;--pop2:#abd600;--popd:#0d1400;
  --lbl:#8e9379;--knee:#9cc06b;--red:#ff6a5a;
  --fb:'Inter',system-ui,-apple-system,sans-serif;--fd:'Inter',system-ui,sans-serif;
}
html,body{background:var(--bg);color:var(--ink);font-family:var(--fb);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{min-height:100vh}
.wrap{max-width:540px;margin:0 auto;padding:0 20px calc(96px + env(safe-area-inset-bottom));position:relative}

.top{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 -20px;padding:calc(16px + env(safe-area-inset-top)) 20px 14px;background:linear-gradient(var(--bg) 74%,transparent)}
.brand{font-weight:800;font-size:30px;letter-spacing:-.045em;color:var(--pop);display:flex;align-items:center;gap:8px;line-height:1}
.brand .dot{display:none}
.topbtns{display:flex;gap:8px}
.iconbtn{width:42px;height:42px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer}
.iconbtn svg{width:20px;height:20px}
.back{display:inline-flex;align-items:center;gap:8px;border:none;background:transparent;color:var(--pop);font-weight:800;font-size:16px;letter-spacing:-.01em;cursor:pointer;padding:0}
.back svg{width:22px;height:22px;stroke:currentColor}

.hero{margin:6px 0 4px}
.eyebrow{font-weight:700;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--lbl)}
.view-h{font-weight:800;font-size:34px;letter-spacing:-.035em;line-height:1.03;color:var(--ink);margin-top:6px}
.view-h em{font-style:normal;color:var(--pop)}
.lead{font-size:15px;line-height:1.5;color:var(--ink2);margin-top:10px}
.section-h{display:flex;align-items:center;gap:12px;margin:24px 0 12px}
.section-h .eyebrow{white-space:nowrap}
.rule{flex:1;height:1px;background:var(--line)}

.seg{display:flex;gap:4px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:4px;margin:14px 0 4px}
.seg button{flex:1;border:none;background:transparent;color:var(--ink2);font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:11px;border-radius:7px;cursor:pointer;transition:.15s}
.seg button.on{background:var(--surface3);color:var(--pop)}

.bigstat{display:flex;align-items:baseline;gap:14px;margin:22px 0 4px}
.bigstat .bsnum{font-weight:800;font-size:68px;line-height:.78;letter-spacing:-.05em;color:var(--pop)}
.bigstat .bsl{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--lbl);line-height:1.2;max-width:130px}

.pcard{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:8px;background:var(--surface);padding:18px;margin-bottom:12px;cursor:pointer;transition:.15s}
.pcard:active{transform:scale(.99)}
.pcard .info{flex:1;min-width:0}
.pcard .pname{font-weight:700;font-size:23px;letter-spacing:-.02em;line-height:1.05;color:var(--ink);display:flex;align-items:center;gap:9px}
.pcard.done .pname{color:var(--ink2)}
.pcard .pmeta{font-weight:700;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--lbl);margin-top:9px}
.pcard .pcount{font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);margin-top:6px}
.del{order:4;align-self:flex-start;border:none;background:transparent;color:var(--ink3);cursor:pointer;padding:4px;margin-left:2px}
.del svg{width:16px;height:16px}
.ring{position:relative;width:64px;height:64px;flex-shrink:0}
.ring svg{transform:rotate(-90deg);display:block}
.ring .rt{stroke:var(--surface3)}
.ring .rp{stroke:var(--pop);transition:stroke-dashoffset .7s cubic-bezier(.2,.85,.25,1)}
.ring .rv{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--ink)}
.pdone{width:48px;height:48px;flex-shrink:0;border:1px solid var(--line2);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--pop)}
.pdone svg{width:22px;height:22px}
.cbadge{display:none}

.progcard{margin:14px 0 20px}
.progcard .row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px}
.progcard .big{font-weight:800;font-size:46px;line-height:.8;letter-spacing:-.04em;color:var(--ink)}
.progcard .big span{color:var(--ink3);font-size:24px}
.progcard .pc{font-weight:800;color:var(--pop);font-size:34px;line-height:.8;letter-spacing:-.03em}
.bar{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden}
.fill{height:100%;width:0;background:var(--pop);border-radius:99px;transition:width .7s cubic-bezier(.2,.85,.25,1)}

.day{border:1px solid var(--line);border-radius:8px;margin-bottom:12px;overflow:hidden;background:var(--surface);animation:rise .42s both}
.day.done{border-color:var(--pop)}
.day-top{display:flex;align-items:center;gap:16px;padding:18px;cursor:pointer}
.dnum{font-weight:800;font-size:46px;line-height:.78;letter-spacing:-.05em;color:var(--pop);flex-shrink:0;min-width:56px}
.day .dm{flex:1;min-width:0}
.dt{font-weight:700;font-size:19px;letter-spacing:-.01em;color:var(--ink);line-height:1.12}
.dg{font-size:13px;color:var(--ink2);margin-top:3px}
.intens{display:flex;gap:6px;margin-top:11px;align-items:center}
.intens i{width:8px;height:8px;border-radius:50%;background:var(--surface3)}
.intens i.f{background:var(--pop)}
.chev{color:var(--ink3);transition:transform .25s;display:flex}
.chev svg{width:20px;height:20px}
.day.open .chev{transform:rotate(180deg)}
.dcheck{display:none}
.body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.body-in{padding:0 18px 18px}

.block{margin-top:18px}
.block .lbl{font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--lbl);margin-bottom:11px;padding-top:16px;border-top:1px solid var(--line)}
.block:first-child .lbl{border-top:none;padding-top:0}
.block.kb .lbl{color:var(--pop2)}
.ex{margin-bottom:15px}
.ex-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.ex-top>span{font-weight:600;font-size:16px;color:var(--ink);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cue{font-weight:700;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);border:1px solid var(--line2);border-radius:4px;padding:2px 6px}
.cue.k{color:var(--knee);border-color:var(--knee)}
.r{font-weight:700;font-size:12px;color:var(--lbl);white-space:nowrap}
.sets{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}

.setchip{display:inline-flex;align-items:center;gap:4px;font-weight:800;font-size:13px;background:var(--surface2);border:1px solid var(--line);color:var(--pop2);border-radius:4px;padding:9px 11px;cursor:pointer;transition:.12s}
.setchip i{font-style:normal;color:var(--ink3);font-size:12px;font-weight:700}
.setchip:active{border-color:var(--red);color:var(--red)}
.setform{display:inline-flex;align-items:center;gap:3px;background:var(--surface2);border:1px dashed var(--line2);border-radius:4px;padding:4px 8px}
.setform input{width:42px;background:transparent;border:none;border-bottom:1px solid var(--line2);border-radius:0;padding:4px 2px;font-size:13px;font-weight:700;color:var(--ink);text-align:center}
.setform input:focus{border-color:var(--pop);outline:none}
.setform .si-x{color:var(--ink3);font-weight:700;font-size:12px;padding:0 2px}
.setform .si-go{color:var(--pop);font-weight:800;font-size:16px;cursor:pointer;background:none;border:none;padding:0 2px}

.rest{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:18px;padding-top:15px;border-top:1px solid var(--line)}
.rest .rl{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--lbl);margin-right:4px;display:inline-flex;align-items:center;gap:5px}
.rest .rl svg{width:13px;height:13px}
.rest button{font-weight:700;font-size:12px;background:var(--surface2);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:8px 12px;cursor:pointer;transition:.12s}
.rest button:active{background:var(--pop);color:var(--popd);border-color:var(--pop)}

.markbtn{margin-top:18px;width:100%;display:flex;align-items:center;justify-content:center;gap:9px;padding:16px;border-radius:8px;cursor:pointer;font-weight:800;font-size:15px;letter-spacing:.01em;background:var(--pop);color:var(--popd);border:1px solid var(--pop);transition:.15s}
.markbtn svg{width:16px;height:16px}
.markbtn:active{transform:scale(.99)}
.day.done .markbtn{background:transparent;color:var(--pop)}

.btn{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:17px;border-radius:8px;cursor:pointer;font-weight:800;font-size:15px;border:1px solid transparent;transition:.15s}
.btn svg{width:18px;height:18px}
.btn-primary{background:var(--pop);color:var(--popd)}
.btn-primary:active{transform:scale(.99)}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--line2)}

  days.querySelectorAll('[data-mark]').forEach(b=>b.onclick=async e=>{

    if(i>=0)p.done.splice(i,1);else p.done.push(n);

    card.classList.toggle('done',on);
    b.innerHTML=on?I.check+' Erledigt':'Tag abhaken';buzz(on?[0,20,35,20]:12);if(on)showSummary(p,n);
    const dnow=p.done.length,tt=p.days.length,pcn=tt?Math.round(dnow/tt*100):0;

    const pl=e.target.closest('[data-plate]');

    const rest=e.target.closest('[data-rest]');

    const add=e.target.closest('[data-add]');

      p.logs[key]=p.logs[key]||[];p.logs[key].push({w,r});saveAll();logAct();buzz(8);
      const newE=(w>0)?w*(1+r/30):0;

function spark(vals){
  const w=300,h=72,pad=10;
  const mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=(mx-mn)||1,n=vals.length;
  const X=i=>n===1?w/2:pad+i*((w-2*pad)/(n-1));
  const Y=v=>h-pad-((v-mn)/rng)*(h-2*pad);
  const pts=vals.map((v,i)=>X(i).toFixed(1)+','+Y(v).toFixed(1)).join(' ');
  const area=pad+','+(h-pad)+' '+pts+' '+(w-pad)+','+(h-pad);
  const dots=vals.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3.4"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" class="spark"><polygon points="${area}" fill="rgba(207,90,44,.14)"/><polyline points="${pts}" fill="none" stroke="var(--pop)" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/><g fill="var(--pop)">${dots}</g></svg>`;
}

function metVal(a){return a.length?a[a.length-1].v:null;}
function metDelta(a){if(a.length<2)return null;return Math.round((a[a.length-1].v-a[0].v)*10)/10;}
function deltaHTML(d,unit){if(d===null)return '<div class="td flat">erster Wert</div>';const cls=d>0?'up':(d<0?'dn':'flat');const sign=d>0?'+':'';return `<div class="td ${cls}">${sign}${d} ${unit} seit Start</div>`;}

function statsHTML(){
  let totDays=0,totDone=0,totalVol=0,topPR=0,topPRname='';const map={},klmap={};
  plans.forEach(p=>{
    if(!p.logs)p.logs={};
    totDays+=p.days.length;totDone+=p.done.length;
    p.days.forEach(d=>d.b.forEach((bl,bi)=>bl.x.forEach((e,xi)=>{
      const key=d.n+'.'+bi+'.'+xi;const arr=p.logs[key];if(!arr||!arr.length)return;
      let top=0,e1=0,vol=0,reps=0;
      arr.forEach(s=>{const w=+s.w||0,r=+s.r||0;vol+=w*r;reps+=r;if(w>top)top=w;const ev=w*(1+r/30);if(ev>e1)e1=ev;});
      e1=Math.round(e1);totalVol+=vol;(map[e.e]=map[e.e]||[]).push({top,e1,reps});
      if(e1>topPR){topPR=e1;topPRname=e.e;}
      const lo=(e.e||'').toLowerCase();
      for(let i=0;i<KEY_LIFTS.length;i++){const kl=KEY_LIFTS[i];if(kl.kw.some(w=>lo.indexOf(w)>=0)){const o=klmap[kl.id]||(klmap[kl.id]={best:0,pts:[]});o.pts.push(e1);if(e1>o.best)o.best=e1;break;}}
    })));
  });
  const pc=totDays?Math.round(totDone/totDays*100):0;
  const names=Object.keys(map).sort((a,b)=>Math.max.apply(null,map[b].map(x=>x.e1))-Math.max.apply(null,map[a].map(x=>x.e1)));
  const vert=metrics.vertical||[],reach=metrics.reach||[];
  const vLat=metVal(vert),rLat=metVal(reach),vVals=vert.map(x=>x.v);
  const tons=Math.round(totalVol/100)/10;
  const lifts=metrics.lifts||{};
  const klCards=KEY_LIFTS.map((kl,idx)=>{
    const est=klmap[kl.id]?klmap[kl.id].best:0;
    const tv=(lifts[kl.id]&&lifts[kl.id].length)?lifts[kl.id][lifts[kl.id].length-1].v:0;
    const best=Math.max(est,tv);
    const pts=klmap[kl.id]?klmap[kl.id].pts:[];
    const tag=best===0?'noch keine Daten':((tv>=est&&tv>0)?'getestet':'geschätzt (e1RM)');
    return `<div class="statcard" style="--i:${idx}"><div class="sh"><div class="snm">${kl.n}</div><div class="sval">${best?best+' kg':'—'}</div></div><div class="ssub">1RM · ${tag}</div>${pts.length>1?spark(pts):''}</div>`;
  }).join('');
  let cards='';
  names.forEach((nm,idx)=>{
    const ents=map[nm];
    const useW=ents.some(x=>x.top>0);
    const vals=ents.map(x=>useW?x.top:x.reps);
    const best=Math.max.apply(null,vals);
    const bestE1=Math.max.apply(null,ents.map(x=>x.e1));
    const sval=useW?best+' kg':best+' Wdh';
    const unit=ents.length===1?'Eintrag':'Einträge';
    const ssub=useW?('PR · e1RM ~'+bestE1+' kg · '+ents.length+' '+unit):('PR-Wdh · '+ents.length+' '+unit);
    cards+=`<div class="statcard" style="--i:${idx}"><div class="sh"><div class="snm">${esc(nm)}</div><div class="sval">${sval}</div></div><div class="ssub">${ssub}</div>${vals.length>1?spark(vals):'<div class="ssub" style="margin-top:8px;opacity:.7">Mehr Sätze loggen für die Kurve.</div>'}</div>`;
  });
  const liftOpts=KEY_LIFTS.map(k=>`<option value="${k.id}">${k.n}</option>`).join('');
  return `<div class="dash">
      <div class="tile feat"><div class="tl">Vertical · Sprunghöhe</div><div class="tv">${vLat!=null?vLat:'—'}<span class="tu"> cm</span></div>${deltaHTML(metDelta(vert),'cm')}${vVals.length>1?spark(vVals):''}</div>
      <div class="tile"><div class="tl">Reach</div><div class="tv">${rLat!=null?rLat:'—'}<span class="tu"> cm</span></div>${deltaHTML(metDelta(reach),'cm')}</div>
      <div class="tile"><div class="tl">Bewegtes Gewicht</div><div class="tv">${tons||0}<span class="tu"> t</span></div><div class="td flat">${Math.round(totalVol).toLocaleString('de-DE')} kg gesamt</div></div>
      <div class="tile"><div class="tl">Top-PR · e1RM</div><div class="tv">${topPR||'—'}<span class="tu"> kg</span></div><div class="td flat">${topPRname?esc(topPRname):'noch keiner'}</div></div>
      <div class="tile"><div class="tl">Einheiten</div><div class="tv">${pc}<span class="tu"> %</span></div><div class="td flat">${totDone} von ${totDays} erledigt</div></div>
    </div>
    ${heatmapHTML()}${bwSectionHTML()}<div class="section-h"><div class="eyebrow">Haupt-Lifts · 1RM</div><div class="rule"></div></div>
    ${klCards}
    <div class="testcard"><div class="th">Getestetes 1RM eintragen</div>
      <div class="trow"><div class="tin"><span>Übung</span><select id="l-sel">${liftOpts}</select></div><div class="tin"><span>1RM (kg)</span><input id="l-kg" inputmode="decimal" placeholder="z. B. 140"></div></div>
      <button class="btn btn-primary" id="l-save" style="margin-top:13px">${I.plus} 1RM speichern</button><div id="l-msg"></div></div>
    <div class="testcard"><div class="th">Test-Werte eintragen</div>
      <div class="trow"><div class="tin"><span>Vertical (cm)</span><input id="m-vert" inputmode="decimal" placeholder="z. B. 68"></div><div class="tin"><span>Reach (cm)</span><input id="m-reach" inputmode="decimal" placeholder="z. B. 245"></div></div><div class="trow" style="margin-top:11px"><div class="tin"><span>Körpergewicht (kg)</span><input id="m-bw" inputmode="decimal" placeholder="z. B. 91"></div></div>
      <button class="btn btn-primary" id="m-save" style="margin-top:13px">${I.plus} Werte speichern</button><div id="m-msg"></div></div>
    <div class="section-h"><div class="eyebrow">Alle PRs & Verläufe</div><div class="rule"></div></div>
    ${names.length?cards:'<div class="empty">Noch keine Sätze geloggt. Öffne in einem Plan einen Tag und trag bei den Übungen <b>kg × Wdh</b> ein — hier erscheinen dann deine PRs und Kurven.</div>'}`;
}

function setMsg(m,err){const el=document.getElementById('set_msg');if(el)el.innerHTML=`<div class="note ${err?'err':''}"><span class="h">${err?'Fehler':'Erledigt'}</span>${esc(m)}</div>`;}
function showImpErr(m){const el=document.getElementById('imp_msg');if(el)el.innerHTML=`<div class="note err"><span class="h">Import fehlgeschlagen</span>${esc(m)}</div>`;}
async function doImport(txt){try{const list=parsePlans(txt);list.forEach(p=>plans.push(p));await saveAll();go('plan',list[0].id);}catch(err){showImpErr(err.message||'Ungültiges Format.');}}
function parsePlans(txt){txt=String(txt).replace(/```json/gi,'').replace(/```/g,'').trim();let data;try{data=JSON.parse(txt);}catch(_){const o=txt.indexOf('{'),a=txt.indexOf('[');let s=(a>=0&&(a<o||o<0))?a:o;const e=Math.max(txt.lastIndexOf('}'),txt.lastIndexOf(']'));if(s<0||e<0)throw new Error('Kein gültiges JSON erkannt.');data=JSON.parse(txt.slice(s,e+1));}let arr;if(Array.isArray(data))arr=data;else if(data.plans&&Array.isArray(data.plans))arr=data.plans;else arr=[data];return arr.map(normalizePlan);}
function normEx(e){if(Array.isArray(e))return{e:e[0]||'',s:e[1]||'',c:e[3]||e[2]||'',k:0};return{e:e.e||e.name||e.exercise||'',s:e.s||e.sets||e.reps||'',c:e.c||e.cue||e.note||'',k:(e.k||e.knee)?1:0};}
function normBlk(b){return{l:b.l||b.label||b.title||'',kb:(b.kb||b.knee||b.kneeBlock)?1:0,x:(b.x||b.items||b.exercises||[]).map(normEx)};}
function normDay(d,i){return{n:Number(d.n||d.day||i+1)||i+1,t:d.t||d.title||('Tag '+(i+1)),g:d.g||d.tag||d.focus||'',i:Math.max(1,Math.min(3,Number(d.i||d.intensity||2)||2)),b:(d.b||d.blocks||[]).map(normBlk)};}
function normalizePlan(p){if(!p||typeof p!=='object')throw new Error('Ungültiges Plan-Objekt.');const days=(p.days||p.tage||[]).map(normDay).sort((a,b)=>a.n-b.n);if(!days.length)throw new Error('Keine Tage gefunden – fehlt das "days"-Feld?');days.forEach((d,i)=>{d.n=i+1;});return{id:uid(),createdAt:Date.now(),done:[],logs:{},metrics:{},name:p.name||p.title||'Importierter Plan',profile:p.profile||p.profil||'',days};}
function exportPlan(p){const data={name:p.name,profile:p.profile,days:p.days};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(p.name||'plan').replace(/[^\w-]+/g,'_').slice(0,40)+'.json';document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();URL.revokeObjectURL(a.href);},500);}
function downloadBackup(){const data={app:'athletik',version:1,exportedAt:new Date().toISOString(),plans};const blob=new Blob([JSON.stringify(data)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='athletik-backup-'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();URL.revokeObjectURL(a.href);},500);setMsg('Backup gespeichert. Leg die Datei an einen sicheren Ort.',false);}
function restorePlan(p){return{id:uid(),createdAt:p.createdAt||Date.now(),name:p.name||'Plan',profile:p.profile||'',days:(p.days||[]).map(normDay),done:Array.isArray(p.done)?p.done.slice():[],logs:(p.logs&&typeof p.logs==='object')?p.logs:{},metrics:(p.metrics&&typeof p.metrics==='object')?p.metrics:{}};}
function doRestore(txt){try{txt=String(txt).replace(/```json/gi,'').replace(/```/g,'').trim();const data=JSON.parse(txt);const arr=Array.isArray(data)?data:(data.plans||[]);if(!arr.length)throw new Error('Keine Pläne im Backup gefunden.');if(!confirm('Backup wiederherstellen? Das ersetzt deine aktuellen '+plans.length+' Pläne auf diesem Gerät.'))return;plans=arr.map(restorePlan);saveAll();go('home');}catch(err){setMsg(err.message||'Ungültiges Backup.',true);}}

async function generate(){
  const v=id=>document.getElementById(id).value.trim();
  const prof={age:v('f_age'),kg:v('f_kg'),exp:v('f_exp'),days:v('f_days'),dur:v('f_dur'),goal:v('f_goal'),eq:v('f_eq'),inj:v('f_inj'),wish:v('f_wish')};
  const msg=document.getElementById('genmsg');document.getElementById('gen').disabled=true;
  msg.innerHTML=`<div class="spin"><div class="sring"></div><div>Claude baut deinen Plan…</div></div>`;
  const sys=`Du bist ein Elite-Athletik- und Kraftcoach. Erstelle einen periodisierten, sicheren, individuell zugeschnittenen Trainingsplan. Berücksichtige Erfahrung, Wiedereinstieg, Verletzungen (besonders Knie: Iso/Tempo zuerst, langsame Progression, Po-Kette entlastet, kein Schmerz), nur vorhandenes Equipment, Hauptziel, Tage/Woche, Dauer. Baue Aufwärmen, Hauptarbeit, Zusatz, Core und Regenerationstage ein. Gib bei Lasten grobe kg-Richtwerte passend zum Profil und kennzeichne RPE.
Antworte AUSSCHLIESSLICH mit gültigem JSON, KEIN Markdown, KEINE Backticks, KEIN Text davor/danach. Schema:
{"name":"kurzer Titel","profile":"1 Zeile Profil","days":[{"n":1,"t":"Tagestitel","g":"kurzer Fokus","i":1,"b":[{"l":"Blocklabel","kb":0,"x":[{"e":"Übung","s":"4×5","c":"kurzer Cue/Gewicht","k":0}]}]}]}
Regeln: i=Intensität 1-3. kb=1 bei Knie-Block. k=1 bei knie-relevantem Cue. s=Sätze×Wdh oder Zeit. c kurz. n fortlaufend 1..Dauer. Deutsch.`;
  const user=`Profil: ${prof.age} Jahre, ${prof.kg} kg, Erfahrung ${prof.exp}. ${prof.days} Tage/Woche, ${prof.dur} Tage Dauer. Hauptziel: ${prof.goal}. Einschränkungen: ${prof.inj||'keine'}. Equipment: ${prof.eq}. Wünsche: ${prof.wish||'keine'}.`;
  try{
    const headers={'Content-Type':'application/json'};
    const body={model:'claude-sonnet-4-20250514',max_tokens:8000,system:sys,messages:[{role:'user',content:user}]};
    if(settings.apiKey){headers['x-api-key']=settings.apiKey;headers['anthropic-version']='2023-06-01';headers['anthropic-dangerous-direct-browser-access']='true';}
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers,body:JSON.stringify(body)});
    if(!res.ok){const t=await res.text();throw new Error('API '+res.status+' – '+t.slice(0,140));}
    const data=await res.json();
    let txt=(data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('').trim();
    const list=parsePlans(txt);list.forEach(p=>plans.push(p));await saveAll();go('plan',list[0].id);
  }catch(err){const extra=settings.apiKey?'':'<br><br>Falls du die App <b>installiert</b> nutzt: trag in den Einstellungen deinen Anthropic-API-Key ein. In der Claude-App geht es ohne Key.';msg.innerHTML=`<div class="note err"><span class="h">Klappte nicht</span>${esc(err.message)}${extra}</div>`;document.getElementById('gen').disabled=false;}
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
try{var __i=document.querySelector('link[rel="apple-touch-icon"]').href;var __m={name:"Apex",short_name:"Apex",display:"standalone",orientation:"portrait",background_color:"#f3ece0",theme_color:"#f3ece0",start_url:location.href,icons:[{src:__i,sizes:"512x512",type:"image/png",purpose:"any maskable"}]};var __b=new Blob([JSON.stringify(__m)],{type:"application/manifest+json"});var __l=document.createElement('link');__l.rel='manifest';__l.href=URL.createObjectURL(__b);document.head.appendChild(__l);}catch(e){}
async function initCloud(){
  if(cloudInit)return;cloudInit=true;
  if(!cloudConfigured())return;
  try{
    sb=window.supabase.createClient(CLOUD.url,CLOUD.key);
    const {data}=await sb.auth.getSession();session=data.session||null;
    sb.auth.onAuthStateChange((ev,s)=>{
      if(ev==='SIGNED_IN'){session=s;sessionStorage.removeItem('guest');loadData().then(()=>go('home'));}
      else if(ev==='SIGNED_OUT'){session=null;plans=[];go('login');}
    });
  }catch(e){sb=null;}
}
async function loadData(){
  const sp=await store.get('app:plans');const ss=await store.get('app:settings');const gm=await store.get('app:metrics');
  if(ss)settings=ss;
  metrics=(gm&&typeof gm==='object')?gm:{};
  plans=(sp&&sp.length)?sp:[];
  let migrated=false;
  plans.forEach(p=>{
    if(!p.logs||typeof p.logs!=='object')p.logs={};
    if(!Array.isArray(p.done))p.done=[];
    const _ns=p.days.map(d=>d.n);
    if(new Set(_ns).size!==_ns.length){p.days.forEach((d,i)=>{d.n=i+1;});migrated=true;}
    if(p.metrics&&typeof p.metrics==='object'){['vertical','reach'].forEach(k=>{if(Array.isArray(p.metrics[k])&&p.metrics[k].length){metrics[k]=(metrics[k]||[]).concat(p.metrics[k]);migrated=true;}});p.metrics={};}
  });
  if(migrated){await store.set('app:metrics',metrics);await saveAll();}
}
async function start(){
  await initCloud();
  if(cloudConfigured()&&!session){go('login');return;}
  await loadData();go('home');
}
async function verifyCode(){
  const m=((document.getElementById('lg-mail')||{}).value||'').trim();
  const codeEl=document.getElementById('lg-code'),msg=document.getElementById('lg-msg');
  const code=codeEl?String(codeEl.value).replace(/\D/g,''):'';
  if(code.length<4){if(codeEl)codeEl.focus();return;}
  if(!sb)return;
  const vb=document.getElementById('lg-verify');if(vb){vb.disabled=true;vb.textContent='Prüfe…';}
  try{
    const {data,error}=await sb.auth.verifyOtp({email:m,token:code,type:'email'});
    if(error)throw error;
    if(data&&data.session){session=data.session;sessionStorage.removeItem('guest');await loadData();go('home');}
  }catch(err){
    if(msg)msg.insertAdjacentHTML('beforeend','<div class="note err" style="margin-top:10px"><span class="h">Code stimmt nicht</span>'+esc((err&&err.message)||'Ungültig oder abgelaufen')+' — neu eingeben oder neuen Code anfordern.</div>');
    if(vb){vb.disabled=false;vb.textContent='Einloggen';}
  }
}
function renderLogin(){
  view='login';
  app.innerHTML=`<div class="login-wrap">
    <div class="brand">APEX</div>
    <div class="loginmark">${I.bolt}</div>
    <h2 class="view-h login-h">Anmeldung</h2>
    <p class="lead login-lead">Melde dich mit deiner E-Mail an — du bekommst einen 6-stelligen Code (kein Passwort). Funktioniert auch als App auf dem Home-Bildschirm.</p>
    <input id="lg-mail" type="email" inputmode="email" placeholder="name@beispiel.de" autocomplete="email">
    <button class="btn btn-primary" id="lg-go">${I.bolt} Code anfordern</button>
    <div id="lg-msg"></div>
    <div class="lginvite"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>Zugang nur mit Einladung</div>
    <div class="smalltxt">Code aus der Mail eingeben (am Desktop geht auch der Link). Danach bleibst du eingeloggt — auch offline.</div>
  </div>`;
  document.getElementById('lg-go').onclick=sendMagicLink;
  const mail=document.getElementById('lg-mail');if(mail)mail.addEventListener('keydown',e=>{if(e.key==='Enter')sendMagicLink();});
}
async function sendMagicLink(){
  const mail=document.getElementById('lg-mail').value.trim();const msg=document.getElementById('lg-msg');
  if(!mail||mail.indexOf('@')<0){msg.innerHTML='<div class="note err"><span class="h">E-Mail fehlt</span>Bitte gib eine gültige E-Mail ein.</div>';return;}
  if(!sb){msg.innerHTML='<div class="note err"><span class="h">Cloud nicht bereit</span>Es ist kein Konto-Backend hinterlegt.</div>';return;}
  document.getElementById('lg-go').disabled=true;
  msg.innerHTML='<div class="spin"><div class="sring"></div><div>Sende Link…</div></div>';
  try{
    const {error}=await sb.auth.signInWithOtp({email:mail,options:{emailRedirectTo:location.href.split('#')[0],shouldCreateUser:false}});
    if(error)throw error;
    msg.innerHTML='<div class="note"><span class="h">Code gesendet</span>6-stelliger Code an <b>'+esc(mail)+'</b> (ggf. Spam prüfen). Code hier eingeben:</div><input id="lg-code" inputmode="numeric" autocomplete="one-time-code" maxlength="10" placeholder="Code" class="codein"><button class="btn btn-primary" id="lg-verify" style="margin-top:10px">Einloggen</button><div class="smalltxt" style="margin-top:10px">Kein Code bekommen? Oben auf „Neuen Code senden". Am Desktop kannst du auch den Link in der Mail klicken.</div>';
    const gb=document.getElementById('lg-go');if(gb){gb.disabled=false;gb.innerHTML=I.bolt+' Neuen Code senden';}
    const cv=document.getElementById('lg-verify');if(cv)cv.onclick=verifyCode;
    const ci=document.getElementById('lg-code');if(ci){ci.focus();ci.addEventListener('keydown',function(e){if(e.key==='Enter')verifyCode();});}
  }catch(err){
    const _m=((err&&err.message)||'').toLowerCase();
    const noacc=_m.indexOf('not allowed')>=0||_m.indexOf('not found')>=0||_m.indexOf('signup')>=0;
    const txt=noacc?'Für diese E-Mail gibt es kein Konto. Bitte lass dich von einem bestehenden Mitglied einladen.':esc(err.message||'Fehler');
    msg.innerHTML='<div class="note err"><span class="h">'+(noacc?'Nur mit Einladung':'Klappte nicht')+'</span>'+txt+'</div>';
    document.getElementById('lg-go').disabled=false;
  }
}
async function doLogout(){try{if(sb)await sb.auth.signOut();}catch(e){}session=null;plans=[];sessionStorage.removeItem('guest');go('login');}
function accountBlock(){
  if(!cloudConfigured())return '<div class="note"><span class="h">Cloud-Konto</span>Noch kein Backend hinterlegt — die App läuft lokal auf diesem Gerät. Sobald Supabase eingerichtet ist, gibt es Login &amp; Sync über alle Geräte.</div>';
  if(session)return '<div class="note"><span class="h">Angemeldet</span>Als <b>'+esc(session.user.email||'Konto')+'</b> eingeloggt. Deine Daten werden synchronisiert.</div><button class="btn btn-ghost" id="ac-out">Abmelden</button>';
  return '<div class="note"><span class="h">Nicht angemeldet</span>Du nutzt die App gerade lokal ohne Konto.</div><button class="btn btn-primary" id="ac-in">Jetzt anmelden</button>';
}
let rtInt=null,rtLeft=0;
function rtFmt(s){const m=Math.floor(s/60),x=s%60;return m+':'+(x<10?'0':'')+x;}
function rtUpdate(){const t=document.getElementById('rt-t');if(t)t.textContent=rtLeft>0?rtFmt(rtLeft):'Fertig!';}
function startRest(sec){if(rtInt){clearInterval(rtInt);rtInt=null;}rtLeft=sec;const bar=document.getElementById('rt');if(bar)bar.classList.add('on');rtUpdate();rtInt=setInterval(function(){rtLeft--;if(rtLeft<=0){rtDone();}else rtUpdate();},1000);}
function addRest(s){if(rtInt){rtLeft+=s;rtUpdate();}else startRest(s);}
function stopRest(){if(rtInt){clearInterval(rtInt);rtInt=null;}const bar=document.getElementById('rt');if(bar)bar.classList.remove('on');}
function rtDone(){if(rtInt){clearInterval(rtInt);rtInt=null;}rtUpdate();try{if(navigator.vibrate)navigator.vibrate([300,140,300,140,300]);}catch(e){}rtBeep();setTimeout(stopRest,2600);}
function rtBeep(){try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return;const ac=new A();function beep(f,t0){const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.0001,ac.currentTime+t0);g.gain.exponentialRampToValueAtTime(0.35,ac.currentTime+t0+0.02);g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+t0+0.45);o.start(ac.currentTime+t0);o.stop(ac.currentTime+t0+0.47);}beep(880,0);beep(1175,0.55);beep(1568,1.1);}catch(e){}}
(function(){var a=document.getElementById('rt-30');if(a)a.onclick=function(){addRest(30);};var x=document.getElementById('rt-x');if(x)x.onclick=function(){stopRest();};})();
(function(){var P=document.getElementById('bnav-plans'),S=document.getElementById('bnav-stats'),R=document.getElementById('bnav-prof');if(P)P.onclick=function(){homeTab='plans';go('home');};if(S)S.onclick=function(){homeTab='stats';go('home');};if(R)R.onclick=function(){go('settings');};})();
start();
</script>
