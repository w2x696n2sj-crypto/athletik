<title>Athletik Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;600;700&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0c0e0b;--bg2:#13160f;--card:#181c12;--line:#2b3120;--volt:#cdff3a;--volt-dim:#9bc02b;--ink:#f3f4ee;--mut:#8b9180;--mut2:#5f6553;--warn:#ffb347;--knee:#5fb8ff;--red:#ff5a52}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:radial-gradient(1200px 600px at 80% -10%,rgba(205,255,58,.07),transparent 60%),var(--bg);color:var(--ink);font-family:'Archivo',system-ui,sans-serif;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
  .wrap{max-width:680px;margin:0 auto;padding:0 18px;padding-bottom:calc(100px + env(safe-area-inset-bottom));padding-top:env(safe-area-inset-top)}
  .top{display:flex;align-items:center;justify-content:space-between;padding:26px 0 10px}
  .brand{font-family:'Anton';text-transform:uppercase;font-size:26px;letter-spacing:.5px;display:flex;align-items:center;gap:9px}
  .brand .dot{width:11px;height:11px;border-radius:99px;background:var(--volt);box-shadow:0 0 14px var(--volt)}
  .iconbtn{width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--mut);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .iconbtn:active{transform:scale(.95)}
  h2.view-h{font-family:'Anton';text-transform:uppercase;font-size:clamp(34px,11vw,52px);line-height:.9;margin:8px 0 4px}
  .lead{color:var(--mut);font-size:14px;margin-bottom:18px}
  .back{background:none;border:none;color:var(--volt);font-family:'Oswald';font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:12px;cursor:pointer;padding:18px 0 6px}

  /* plan cards on home */
  .pcard{border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,var(--card),var(--bg2));padding:16px;margin-bottom:12px;cursor:pointer;position:relative;transition:.2s}
  .pcard:active{transform:scale(.99)}
  .pcard .pname{font-family:'Oswald';font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:.02em;padding-right:30px}
  .pcard .pmeta{font-size:12.5px;color:var(--mut);margin-top:3px}
  .pbar{height:8px;background:#0e1109;border:1px solid var(--line);border-radius:99px;overflow:hidden;margin-top:13px}
  .pfill{height:100%;background:linear-gradient(90deg,var(--volt-dim),var(--volt));border-radius:99px;transition:width .4s}
  .pcount{font-family:'Oswald';font-size:12px;color:var(--volt-dim);margin-top:7px;letter-spacing:.06em}
  .del{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:8px;border:none;background:transparent;color:var(--mut2);font-size:15px;cursor:pointer}
  .del:active{color:var(--red)}

  .bigbtn{width:100%;padding:16px;border-radius:14px;cursor:pointer;font-family:'Oswald';font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:15px;background:var(--volt);color:#101307;border:none;margin-top:6px}
  .bigbtn:active{transform:scale(.98)}
  .bigbtn.ghost{background:transparent;border:1px solid var(--volt-dim);color:var(--volt)}
  .bigbtn:disabled{opacity:.5}

  .empty{text-align:center;color:var(--mut);padding:36px 10px;border:1px dashed var(--line);border-radius:16px;margin-bottom:16px;font-size:14px}

  /* plan detail */
  .progwrap{display:flex;align-items:center;gap:14px;margin:6px 0 16px}
  .bar{flex:1;height:10px;background:var(--card);border:1px solid var(--line);border-radius:99px;overflow:hidden}
  .fill{height:100%;width:0;background:linear-gradient(90deg,var(--volt-dim),var(--volt));border-radius:99px;transition:width .45s}
  .pct{font-family:'Anton';font-size:20px;min-width:62px;text-align:right}
  .pct small{font-family:'Oswald';font-size:11px;color:var(--mut);letter-spacing:.08em;display:block;text-align:right}
  .wk{font-family:'Oswald';text-transform:uppercase;letter-spacing:.18em;font-size:11px;color:var(--mut2);margin:20px 2px 10px}
  .day{border:1px solid var(--line);border-radius:16px;margin-bottom:11px;overflow:hidden;background:linear-gradient(180deg,var(--card),var(--bg2))}
  .day.done{border-color:var(--volt-dim)}
  .dcheck{width:24px;height:24px;border-radius:99px;background:var(--volt);color:#101307;font-family:'Oswald';font-weight:700;font-size:13px;display:none;align-items:center;justify-content:center;flex-shrink:0;margin-right:2px}
  .day.done .dcheck{display:flex}
  .pcheck{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:99px;background:var(--volt);color:#101307;font-size:11px;font-weight:700;vertical-align:middle;margin-left:7px}
  .day-top{display:flex;align-items:center;gap:13px;padding:14px 14px;cursor:pointer}
  .num{font-family:'Anton';font-size:28px;width:42px;text-align:center;color:var(--volt);flex-shrink:0}
  .dm{flex:1;min-width:0}
  .dt{font-family:'Oswald';font-weight:600;font-size:15.5px}
  .dg{font-size:12px;color:var(--mut);margin-top:2px}
  .intens{display:flex;gap:3px;margin-top:6px;align-items:center}
  .intens i{width:15px;height:4px;border-radius:2px;background:var(--line)}
  .intens i.f{background:var(--volt)}
  .chev{color:var(--mut2);font-size:12px;transition:.25s}
  .day.open .chev{transform:rotate(180deg);color:var(--volt)}
  .body{max-height:0;overflow:hidden;transition:max-height .4s ease}
  .body-in{padding:2px 14px 15px;border-top:1px solid var(--line)}
  .block{margin-top:13px}
  .block .lbl{font-family:'Oswald';text-transform:uppercase;letter-spacing:.14em;font-size:10.5px;color:var(--volt);display:flex;gap:8px;align-items:center;margin-bottom:6px}
  .block .lbl::after{content:"";flex:1;height:1px;background:var(--line)}
  .block.kb .lbl{color:var(--knee)}
  .ex{display:flex;justify-content:space-between;gap:12px;font-size:13.5px;padding:3px 0}
  .ex .r{font-family:'Oswald';font-weight:600;color:var(--volt-dim);white-space:nowrap;font-variant-numeric:tabular-nums}
  .cue{display:block;font-size:11.5px;color:var(--mut);margin-top:1px}
  .cue.k{color:var(--knee)}
  .markbtn{margin-top:16px;width:100%;padding:12px;border-radius:11px;cursor:pointer;font-family:'Oswald';font-weight:600;text-transform:uppercase;letter-spacing:.1em;font-size:13px;background:transparent;border:1px solid var(--volt-dim);color:var(--volt)}
  .day.done .markbtn{background:var(--volt);color:#101307;border-color:var(--volt)}

  /* forms */
  label{display:block;font-family:'Oswald';text-transform:uppercase;letter-spacing:.1em;font-size:11px;color:var(--volt);margin:16px 0 6px}
  input,textarea,select{width:100%;background:var(--card);border:1px solid var(--line);border-radius:11px;color:var(--ink);font-family:'Archivo';font-size:15px;padding:12px 13px;outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--volt-dim)}
  textarea{resize:vertical;min-height:84px}
  .row{display:flex;gap:10px}
  .row>div{flex:1}
  .hint{font-size:12.5px;color:var(--mut);margin-top:8px}
  .note{border:1px solid var(--line);border-left:3px solid var(--volt);background:var(--card);border-radius:12px;padding:13px 14px;font-size:13px;color:var(--mut);margin:14px 0}
  .note b{color:var(--ink)}
  .note .h{font-family:'Oswald';text-transform:uppercase;letter-spacing:.12em;color:var(--volt);font-size:11px;display:block;margin-bottom:5px}
  .note.k{border-left-color:var(--knee)} .note.k .h{color:var(--knee)}
  .spin{display:flex;flex-direction:column;align-items:center;gap:16px;padding:46px 0;color:var(--mut)}
  .ring{width:46px;height:46px;border:3px solid var(--line);border-top-color:var(--volt);border-radius:99px;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .err{border-left-color:var(--red);color:#ffb4af}.err .h{color:var(--red)}
  .small{font-size:12px;color:var(--mut2);margin-top:20px;text-align:center}
  .small b{color:var(--mut)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ---------- Dual storage: window.storage (Claude-Artifact) + localStorage (Standalone) ---------- */
const store={
  async get(k){
    try{if(window.storage){const r=await window.storage.get(k,false);if(r&&r.value!=null)return JSON.parse(r.value);}}catch(e){}
    try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):null;}catch(e){return null;}
  },
  async set(k,val){
    const s=JSON.stringify(val);
    try{if(window.storage)await window.storage.set(k,s,false);}catch(e){}
    try{localStorage.setItem(k,s);}catch(e){}
  }
};

/* ---------- State ---------- */
let plans=[], settings={apiKey:''}, view='home', curId=null;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const app=document.getElementById('app');

/* ---------- Seed-Plan (dein 14-Tage Block) ---------- */
function seedPlan(){
  const ex=(e,s,c,k)=>({e,s,c:c||'',k:k?1:0});
  const blk=(l,x,kb)=>({l,kb:kb?1:0,x});
  return {id:uid(),name:"14-Tage Sprungkraft-Block",createdAt:Date.now(),done:[],
   profile:"19 J. · 91 kg · erfahren · Knie im Aufbau · Ziel Sprungkraft",
   days:[

/* ---------- Persist ---------- */
async function saveAll(){await store.set('app:plans',plans);}
async function saveSettings(){await store.set('app:settings',settings);}

/* ---------- Render router ---------- */
function go(v,id){view=v;if(id!==undefined)curId=id;render();window.scrollTo(0,0);}
function curPlan(){return plans.find(p=>p.id===curId);}

function render(){
  if(view==='home')return renderHome();
  if(view==='plan')return renderPlan();
  if(view==='create')return renderCreate();
  if(view==='import')return renderImport();
  if(view==='settings')return renderSettings();
}

function renderHome(){
  const cards=plans.map(p=>{
    const tot=p.days.length, dn=p.done.length, pc=tot?Math.round(dn/tot*100):0;
    return `<div class="pcard" data-open="${p.id}">
      <button class="del" data-del="${p.id}">✕</button>
      <div class="pname">${esc(p.name)}${(tot&&dn===tot)?'<span class="pcheck">✓</span>':''}</div>
      <div class="pmeta">${tot} Einheiten${p.profile?' · '+esc(p.profile):''}</div>
      <div class="pbar"><div class="pfill" style="width:${pc}%"></div></div>
      <div class="pcount">${dn}/${tot} erledigt · ${pc}%</div>
    </div>`;
  }).join('');
  app.innerHTML=`
    <div class="top"><div class="brand"><span class="dot"></span>ATHLETIK</div>
      <button class="iconbtn" id="gset">⚙</button></div>
    <h2 class="view-h">Deine<br>Pläne.</h2>
    <p class="lead">Tippen zum Öffnen. Fortschritt wird automatisch gespeichert.</p>
    ${plans.length?cards:'<div class="empty">Noch kein Plan. Erstell deinen ersten mit Claude. 💪</div>'}
    <button class="bigbtn" id="import">+ Plan importieren (.json)</button>
    <button class="bigbtn ghost" id="new">Neuer Plan mit Claude (online)</button>
    <div class="small"><b>So geht's offline:</b> Plan im Chat mit Claude generieren → als .json speichern → hier importieren. Kein Key nötig.</div>`;
  document.getElementById('import').onclick=()=>go('import');
  document.getElementById('new').onclick=()=>go('create');
  document.getElementById('gset').onclick=()=>go('settings');
  app.querySelectorAll('[data-open]').forEach(el=>el.onclick=e=>{if(e.target.dataset.del)return;go('plan',el.dataset.open);});
  app.querySelectorAll('[data-del]').forEach(b=>b.onclick=async e=>{e.stopPropagation();if(confirm('Plan löschen?')){plans=plans.filter(p=>p.id!==b.dataset.del);await saveAll();render();}});
}

function renderPlan(){
  const p=curPlan();if(!p)return go('home');
  const tot=p.days.length,dn=p.done.length,pc=tot?Math.round(dn/tot*100):0;
  let html='',lastWk=0;
  p.days.forEach(d=>{
    const wk=Math.ceil(d.n/7);
    if(tot>7&&wk!==lastWk){html+=`<div class="wk">Woche ${wk}</div>`;lastWk=wk;}
    const done=p.done.includes(d.n);
    const bars=[1,2,3].map(k=>`<i class="${k<=d.i?'f':''}"></i>`).join('');
    const blocks=d.b.map(bl=>{
      const exs=bl.x.map(e=>{
        const cue=e.c?`<span class="cue ${e.k?'k':''}">${esc(e.c)}</span>`:'';
        const r=e.s?`<span class="r">${esc(e.s)}</span>`:'<span class="r"></span>';
        return `<div class="ex"><span>${esc(e.e)}${cue}</span>${r}</div>`;
      }).join('');
      return `<div class="block ${bl.kb?'kb':''}"><div class="lbl">${esc(bl.l)}</div>${exs}</div>`;
    }).join('');
    html+=`<div class="day ${done?'done':''}" data-d="${d.n}">
      <div class="day-top"><div class="num">${d.n}</div>
        <div class="dm"><div class="dt">${esc(d.t)}</div><div class="dg">${esc(d.g)}</div>
          <div class="intens">${bars}</div></div><div class="dcheck">✓</div><div class="chev">▼</div></div>
      <div class="body"><div class="body-in">${blocks}
        <button class="markbtn" data-mark="${d.n}">${done?'✓ Erledigt':'Als erledigt markieren'}</button>
      </div></div></div>`;
  });
  app.innerHTML=`<div class="top" style="padding:18px 0 2px"><button class="back" id="back" style="padding:0">‹ Pläne</button><button class="iconbtn" id="exp" title="Exportieren">⤓</button></div>
    <h2 class="view-h" style="font-size:clamp(28px,9vw,42px)">${esc(p.name)}</h2>
    <div class="progwrap"><div class="bar"><div class="fill" style="width:${pc}%"></div></div>
      <div class="pct">${dn}/${tot}<small>${pc}%</small></div></div>
    ${html}`;
  document.getElementById('back').onclick=()=>go('home');
  document.getElementById('exp').onclick=()=>exportPlan(p);
  app.querySelectorAll('.day-top').forEach(t=>t.onclick=()=>{const c=t.parentElement,b=c.querySelector('.body');const o=c.classList.toggle('open');b.style.maxHeight=o?b.scrollHeight+'px':'0';});
  app.querySelectorAll('[data-mark]').forEach(b=>b.onclick=async e=>{
    e.stopPropagation();
    const n=+b.dataset.mark;const i=p.done.indexOf(n);
    if(i>=0)p.done.splice(i,1);else p.done.push(n);
    await saveAll();
    const on=p.done.includes(n), card=b.closest('.day');
    card.classList.toggle('done',on);
    b.textContent=on?'✓ Erledigt':'Als erledigt markieren';
    const dnow=p.done.length,tt=p.days.length,pcn=tt?Math.round(dnow/tt*100):0;
    const fill=app.querySelector('.fill');if(fill)fill.style.width=pcn+'%';
    const pct=app.querySelector('.pct');if(pct)pct.innerHTML=`${dnow}/${tt}<small>${pcn}%</small>`;
  });
}

/* ---------- AI generation ---------- */
async function generate(){
  const v=id=>document.getElementById(id).value.trim();
  const prof={age:v('f_age'),kg:v('f_kg'),exp:v('f_exp'),days:v('f_days'),dur:v('f_dur'),goal:v('f_goal'),eq:v('f_eq'),inj:v('f_inj'),wish:v('f_wish')};
  const msg=document.getElementById('genmsg');
  document.getElementById('gen').disabled=true;
  msg.innerHTML=`<div class="spin"><div class="ring"></div><div>Claude baut deinen Plan…</div></div>`;

  const sys=`Du bist ein Elite-Athletik- und Kraftcoach. Erstelle einen periodisierten, sicheren, individuell zugeschnittenen Trainingsplan.
Berücksichtige: Erfahrung, Wiedereinstieg, Verletzungen (besonders Knie: Iso/Tempo zuerst, Progression langsam, Po-Kette entlastet, kein Schmerz), nur vorhandenes Equipment, Hauptziel, Tage/Woche, Dauer. Baue Aufwärmen, Hauptarbeit, Zusatz und Core ein, plus Regenerationstage. Gib bei Lasten grobe Richtwerte (kg) passend zum Profil und kennzeichne RPE.
Antworte AUSSCHLIESSLICH mit gültigem JSON, KEIN Markdown, KEINE Backticks, KEIN Text davor/danach. Exaktes Schema:
{"name":"kurzer Titel","profile":"1 Zeile Profil","days":[{"n":1,"t":"Tagestitel","g":"kurzer Tag-Tag/Fokus","i":1,"b":[{"l":"Blocklabel","kb":0,"x":[{"e":"Übung","s":"4×5","c":"kurzer Cue/Gewicht","k":0}]}]}]}
Regeln: i = Intensität 1-3. kb = 1 wenn Knie-Block. k = 1 wenn knie-relevanter Cue (wird blau). s = Sätze×Wdh oder Zeit. c kurz halten. n fortlaufend 1..Dauer. Deutsch.`;
  const user=`Profil: ${prof.age} Jahre, ${prof.kg} kg, Erfahrung ${prof.exp}. ${prof.days} Tage/Woche, ${prof.dur} Tage Gesamtdauer. Hauptziel: ${prof.goal}. Einschränkungen: ${prof.inj||'keine'}. Equipment: ${prof.eq}. Zusätzliche Wünsche: ${prof.wish||'keine'}.`;

  try{
    const headers={'Content-Type':'application/json'};
    const body={model:'claude-sonnet-4-20250514',max_tokens:8000,system:sys,messages:[{role:'user',content:user}]};
    if(settings.apiKey){headers['x-api-key']=settings.apiKey;headers['anthropic-version']='2023-06-01';headers['anthropic-dangerous-direct-browser-access']='true';}
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers,body:JSON.stringify(body)});
    if(!res.ok){const t=await res.text();throw new Error('API '+res.status+' – '+t.slice(0,160));}
    const data=await res.json();
    let txt=(data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('').trim();
    txt=txt.replace(/```json/gi,'').replace(/```/g,'').trim();
    const s=txt.indexOf('{'),e=txt.lastIndexOf('}');
    if(s<0||e<0)throw new Error('Keine JSON-Antwort erhalten.');
    const plan=JSON.parse(txt.slice(s,e+1));
    if(!plan.days||!plan.days.length)throw new Error('Plan enthält keine Tage.');
    plan.id=uid();plan.createdAt=Date.now();plan.done=[];
    plan.days.forEach(d=>{d.b=(d.b||[]).map(b=>({l:b.l||'',kb:b.kb?1:0,x:(b.x||[]).map(e=>({e:e.e||'',s:e.s||'',c:e.c||'',k:e.k?1:0}))}));});
    plans.push(plan);await saveAll();go('plan',plan.id);
  }catch(err){
    let extra=settings.apiKey?'':'<br><br>Falls du die App <b>installiert</b> nutzt: trag in den Einstellungen deinen Anthropic-API-Key ein — Standalone braucht ihn. In der Claude-App sollte es ohne Key gehen.';
    msg.innerHTML=`<div class="note err"><span class="h">Klappte nicht</span>${esc(err.message)}${extra}</div>`;
    document.getElementById('gen').disabled=false;
  }
}

    <div class="note"><span class="h">So einfach ist es</span>Sag mir im Chat einfach, was für einen Plan du willst — ich gebe dir das fertige JSON bzw. eine .json-Datei. Du musst nichts selbst bauen. Beim Import werden <b>Knie-Markierungen, Gewichte, Intensität &amp; Wochen</b> automatisch richtig formatiert.</div>`;
  document.getElementById('back').onclick=()=>go('home');
  document.getElementById('imp_file').onchange=e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>doImport(r.result);r.onerror=()=>showImpErr('Datei konnte nicht gelesen werden.');r.readAsText(f);};
  document.getElementById('imp_go').onclick=()=>{const t=document.getElementById('imp_text').value.trim();if(!t)return showImpErr('Bitte JSON einfügen oder eine Datei wählen.');doImport(t);};
}
function showImpErr(m){const el=document.getElementById('imp_msg');if(el)el.innerHTML=`<div class="note err"><span class="h">Import fehlgeschlagen</span>${esc(m)}</div>`;}
async function doImport(txt){
  try{
    const list=parsePlans(txt);
    list.forEach(p=>plans.push(p));
    await saveAll();
    go('plan',list[0].id);
  }catch(err){showImpErr(err.message||'Ungültiges Format.');}
}
function parsePlans(txt){
  txt=String(txt).replace(/```json/gi,'').replace(/```/g,'').trim();
  let data;
  try{data=JSON.parse(txt);}
  catch(_){
    const o=txt.indexOf('{'),a=txt.indexOf('[');
    let s=(a>=0&&(a<o||o<0))?a:o;
    const e=Math.max(txt.lastIndexOf('}'),txt.lastIndexOf(']'));
    if(s<0||e<0)throw new Error('Kein gültiges JSON erkannt.');
    data=JSON.parse(txt.slice(s,e+1));
  }
  let arr;
  if(Array.isArray(data))arr=data;
  else if(data.plans&&Array.isArray(data.plans))arr=data.plans;
  else arr=[data];
  return arr.map(normalizePlan);
}
function normEx(e){
  if(Array.isArray(e))return{e:e[0]||'',s:e[1]||'',c:e[3]||e[2]||'',k:0};
  return{e:e.e||e.name||e.exercise||'',s:e.s||e.sets||e.reps||'',c:e.c||e.cue||e.note||'',k:(e.k||e.knee)?1:0};
}
function normBlk(b){return{l:b.l||b.label||b.title||'',kb:(b.kb||b.knee||b.kneeBlock)?1:0,x:(b.x||b.items||b.exercises||[]).map(normEx)};}
function normDay(d,i){return{n:Number(d.n||d.day||i+1)||i+1,t:d.t||d.title||('Tag '+(i+1)),g:d.g||d.tag||d.focus||'',i:Math.max(1,Math.min(3,Number(d.i||d.intensity||2)||2)),b:(d.b||d.blocks||[]).map(normBlk)};}
function normalizePlan(p){
  if(!p||typeof p!=='object')throw new Error('Ungültiges Plan-Objekt.');
  const days=(p.days||p.tage||[]).map(normDay).sort((a,b)=>a.n-b.n);
  if(!days.length)throw new Error('Keine Tage gefunden – fehlt das "days"-Feld?');
  return{id:uid(),createdAt:Date.now(),done:[],name:p.name||p.title||'Importierter Plan',profile:p.profile||p.profil||'',days};
}
function exportPlan(p){
  const data={name:p.name,profile:p.profile,days:p.days};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(p.name||'plan').replace(/[^\w-]+/g,'_').slice(0,40)+'.json';
  document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();URL.revokeObjectURL(a.href);},500);
}

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

(async function(){
  const sp=await store.get('app:plans');const ss=await store.get('app:settings');
  if(ss)settings=ss;
  if(sp&&sp.length)plans=sp;else{plans=[seedPlan()];await saveAll();}
  render();
})();
